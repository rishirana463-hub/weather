<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          placeholder="Search city..."
          class="search-input"
        />
        <button id="searchBtn" class="search-btn">Search</button>
      </div>

      <div class="weather-card">
        <div id="weatherContent" class="weather-content hidden">
          <div class="weather-header">
            <p id="date" class="date"></p>
            <h2 id="cityName" class="city-name"></h2>
          </div>

          <div class="weather-main">
            <div id="weatherIcon" class="weather-icon"></div>
            <div class="temperature-section">
              <div id="temperature" class="temperature"></div>
              <p id="weatherDescription" class="weather-description"></p>
            </div>
          </div>

          <div class="weather-details">
            <div class="detail-box">
              <span class="detail-label">Humidity</span>
              <span id="humidity" class="detail-value"></span>
            </div>
            <div class="detail-box">
              <span class="detail-label">Feels Like</span>
              <span id="feelsLike" class="detail-value"></span>
            </div>
            <div class="detail-box">
              <span class="detail-label">Wind Speed</span>
              <span id="windSpeed" class="detail-value"></span>
            </div>
            <div class="detail-box">
              <span class="detail-label">Pressure</span>
              <span id="pressure" class="detail-value"></span>
            </div>
          </div>

          <div id="dayBadge" class="day-badge"></div>
        </div>

        <div id="errorMessage" class="error-message hidden"></div>
        <div id="loadingSpinner" class="loading-spinner hidden">
          <div class="spinner"></div>
          <p>Loading weather data...</p>
        </div>
      </div>
    </div>

    <script src="icons.js"></script>
    <script src="script.js"></script>
  </body>
</html>
